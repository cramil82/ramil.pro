name: Deploy to Hostinger

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  NODE_VERSION: '20'
  SSH_PORT: '65002'

jobs:
  deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
        env:
          NODE_ENV: production

      - name: Configure SSH
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' '${{ secrets.HOSTINGER_SSH_KEY }}' > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key

      - name: Test SSH connection
        run: |
          ssh -p ${{ env.SSH_PORT }} \
            -i ~/.ssh/deploy_key \
            -o StrictHostKeyChecking=no \
            ${{ secrets.HOSTINGER_USER }}@${{ secrets.HOSTINGER_HOST }} \
            "echo 'SSH OK'"

      - name: Sync files to Hostinger
        run: |
          rsync -azr --delete \
            --exclude='.git/' \
            --exclude='.github/' \
            --exclude='node_modules/' \
            --exclude='.env.local' \
            --exclude='.claude/' \
            --exclude='documentos/' \
            --exclude='screenshots/' \
            --exclude='*.log' \
            --exclude='*.md' \
            --exclude='*.docx' \
            -e "ssh -p ${{ env.SSH_PORT }} -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no" \
            ./ \
            ${{ secrets.HOSTINGER_USER }}@${{ secrets.HOSTINGER_HOST }}:${{ secrets.HOSTINGER_REMOTE_PATH }}/

      - name: Install prod deps & restart app
        run: |
          ssh -p ${{ env.SSH_PORT }} \
            -i ~/.ssh/deploy_key \
            -o StrictHostKeyChecking=no \
            ${{ secrets.HOSTINGER_USER }}@${{ secrets.HOSTINGER_HOST }} \
            "cd ${{ secrets.HOSTINGER_REMOTE_PATH }} && npm ci --omit=dev && (pm2 reload all --update-env 2>/dev/null || pm2 restart all 2>/dev/null || echo 'Reinicia en hPanel')"
