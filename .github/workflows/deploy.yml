name: Deploy to Hostinger

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  NODE_VERSION: '20'
  SSH_PORT: '65002'

jobs:
  deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
        env:
          NODE_ENV: production

      - name: Configure SSH
        env:
          SSH_PRIVATE_KEY: ${{ secrets.HOSTINGER_SSH_KEY }}
          SSH_HOST: ${{ secrets.HOSTINGER_HOST }}
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "$SSH_PRIVATE_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -p "$SSH_PORT" -H "$SSH_HOST" >> ~/.ssh/known_hosts 2>/dev/null

      - name: Sync files to Hostinger
        env:
          SSH_USER: ${{ secrets.HOSTINGER_USER }}
          SSH_HOST: ${{ secrets.HOSTINGER_HOST }}
          REMOTE_PATH: ${{ secrets.HOSTINGER_REMOTE_PATH }}
        run: |
          rsync -azr --delete \
            --exclude='.git/' \
            --exclude='.github/' \
            --exclude='node_modules/' \
            --exclude='.env.local' \
            --exclude='.env.*.local' \
            --exclude='.claude/' \
            --exclude='documentos/' \
            --exclude='screenshots/' \
            --exclude='*.log' \
            --exclude='*.md' \
            --exclude='*.docx' \
            -e "ssh -p $SSH_PORT -i ~/.ssh/deploy_key" \
            ./ \
            "$SSH_USER@$SSH_HOST:$REMOTE_PATH/"

      - name: Install prod deps & restart app
        env:
          SSH_USER: ${{ secrets.HOSTINGER_USER }}
          SSH_HOST: ${{ secrets.HOSTINGER_HOST }}
          REMOTE_PATH: ${{ secrets.HOSTINGER_REMOTE_PATH }}
        run: |
          ssh -p "$SSH_PORT" -i ~/.ssh/deploy_key "$SSH_USER@$SSH_HOST" \
            "set -e && \
             cd '$REMOTE_PATH' && \
             npm ci --omit=dev && \
             (pm2 reload all --update-env 2>/dev/null || pm2 restart all 2>/dev/null || echo '⚠️ Reinicia manualmente en hPanel')"
